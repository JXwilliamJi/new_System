<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#1a3c6e">
    <title>法务合规管理平台 - 风险管理</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/mobile-responsive.css">
</head>
<body>
    <div id="dashboard">
        <!-- 侧边栏 -->
        <div class="sidebar">
            <div class="brand">
                <i class="fa-solid fa-shield-halved"></i>
                <span>风险合规管理平台</span>
            </div>
            <a href="/pages/dashboard.html" class="nav-item">
                <i class="fa-solid fa-chart-line"></i> 工作台
            </a>
            <a href="/pages/contracts.html" class="nav-item">
                <i class="fa-solid fa-file-contract"></i> 合同管理
            </a>
            <a href="/pages/regulations.html" class="nav-item">
                <i class="fa-solid fa-book"></i> 制度管理
            </a>
            <a href="/pages/compliance.html" class="nav-item">
                <i class="fa-solid fa-clipboard-check"></i> 合规管理
            </a>
            <a href="/pages/risks.html" class="nav-item active">
                <i class="fa-solid fa-triangle-exclamation"></i> 风险管理
            </a>
            
            <div class="user-profile">
                <div class="avatar">法</div>
                <div>
                    <div class="font-bold">用户</div>
                    <div class="text-sm" style="opacity: 0.7;">部门</div>
                </div>
            </div>
        </div>

        <!-- 主内容 -->
        <div class="main-content">
            <div class="header">
                <div>
                    <h1>风险管理</h1>
                    <p style="color: var(--text-light); margin-top: 5px;">管理企业风险事项</p>
                </div>
                <div>
                    <button class="btn" onclick="showAddModal()">
                        <i class="fa-solid fa-plus"></i> 新增风险
                    </button>
                </div>
            </div>

            <!-- 工具栏 -->
            <div class="toolbar">
                <div class="toolbar-left">
                    <input type="text" class="search-box" id="search-input" placeholder="搜索风险...">
                    <select class="filter-select" id="status-filter">
                        <option value="">全部状态</option>
                        <option value="open">待处理</option>
                        <option value="monitoring">监控中</option>
                        <option value="closed">已关闭</option>
                    </select>
                    <select class="filter-select" id="level-filter">
                        <option value="">全部等级</option>
                        <option value="high">高风险</option>
                        <option value="medium">中风险</option>
                        <option value="low">低风险</option>
                    </select>
                </div>
                <div class="toolbar-right">
                    <button class="btn btn-secondary" onclick="loadRisks()">
                        <i class="fa-solid fa-refresh"></i> 刷新
                    </button>
                </div>
            </div>

            <!-- 风险列表 -->
            <div class="chart-card">
                <table>
                    <thead>
                        <tr>
                            <th>风险标题</th>
                            <th>分类</th>
                            <th>风险等级</th>
                            <th>发生概率</th>
                            <th>影响程度</th>
                            <th>状态</th>
                            <th>负责人</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="risks-table">
                        <tr>
                            <td colspan="8" style="text-align: center;">加载中...</td>
                        </tr>
                    </tbody>
                </table>
                <div id="pagination"></div>
            </div>
        </div>
    </div>

    <!-- 新增/编辑风险模态框 -->
    <div class="modal" id="risk-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title">新增风险</h2>
                <button class="modal-close" onclick="hideModal('risk-modal')">&times;</button>
            </div>
            <form id="risk-form">
                <input type="hidden" id="risk-id">
                <div class="form-group">
                    <label>风险标题 *</label>
                    <input type="text" id="risk-title" required>
                </div>
                <div class="form-group">
                    <label>风险分类 *</label>
                    <select id="risk-category" required>
                        <option value="">请选择</option>
                        <option value="知识产权">知识产权</option>
                        <option value="合同管理">合同管理</option>
                        <option value="数据安全">数据安全</option>
                        <option value="财务风险">财务风险</option>
                        <option value="运营风险">运营风险</option>
                        <option value="法律风险">法律风险</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>风险描述</label>
                    <textarea id="risk-description" rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>风险等级</label>
                    <select id="risk-level">
                        <option value="low">低风险</option>
                        <option value="medium">中风险</option>
                        <option value="high">高风险</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>发生概率</label>
                    <select id="probability">
                        <option value="low">低</option>
                        <option value="medium">中</option>
                        <option value="high">高</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>影响程度</label>
                    <select id="impact">
                        <option value="low">低</option>
                        <option value="medium">中</option>
                        <option value="high">高</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>状态</label>
                    <select id="risk-status">
                        <option value="open">待处理</option>
                        <option value="monitoring">监控中</option>
                        <option value="closed">已关闭</option>
                    </select>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" onclick="hideModal('risk-modal')">取消</button>
                    <button type="submit" class="btn">保存</button>
                </div>
            </form>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        let currentPage = 1;
        const pageSize = 10;

        // 页面加载检查
        if (!checkAuth()) {
            // 未登录，跳转到登录页
        } else {
            // 已登录，加载数据
            loadRisks();
            setUserProfile();
            generateSidebarNav();
        }

        // 加载风险列表
        async function loadRisks() {
            const status = document.getElementById('status-filter').value;
            const level = document.getElementById('level-filter').value;
            
            let url = `/risks?page=${currentPage}&limit=${pageSize}`;
            if (status) url += `&status=${status}`;
            if (level) url += `&level=${level}`;

            try {
                const response = await apiGet(url);
                if (response.success) {
                    renderRisksTable(response.data.risks);
                    renderPagination(response.data.pagination);
                }
            } catch (error) {
                console.error('加载风险列表失败:', error);
            }
        }

        // 渲染风险表格
        function renderRisksTable(risks) {
            const tbody = document.getElementById('risks-table');
            if (risks.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" style="text-align: center;">暂无风险数据</td></tr>';
                return;
            }

            tbody.innerHTML = risks.map(risk => `
                <tr>
                    <td>${risk.title}</td>
                    <td>${risk.category}</td>
                    <td><span class="status ${getStatusClass(risk.level)}">${getStatusText(risk.level)}</span></td>
                    <td>${risk.probability || '-'}</td>
                    <td>${risk.impact || '-'}</td>
                    <td><span class="status ${getStatusClass(risk.status)}">${getStatusText(risk.status)}</span></td>
                    <td>${risk.assigned_to_name || '-'}</td>
                    <td>
                        <button class="btn btn-secondary" onclick="editRisk(${risk.id})" style="padding: 5px 10px; font-size: 12px;">
                            <i class="fa-solid fa-edit"></i>
                        </button>
                        <button class="btn btn-danger" onclick="deleteRisk(${risk.id})" style="padding: 5px 10px; font-size: 12px;">
                            <i class="fa-solid fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // 渲染分页
        function renderPagination(pagination) {
            const paginationDiv = document.getElementById('pagination');
            paginationDiv.innerHTML = '';
            paginationDiv.appendChild(createPagination(pagination, (page) => {
                currentPage = page;
                loadRisks();
            }));
        }

        // 显示新增模态框
        function showAddModal() {
            document.getElementById('modal-title').textContent = '新增风险';
            document.getElementById('risk-form').reset();
            document.getElementById('risk-id').value = '';
            showModal('risk-modal');
        }

        // 编辑风险
        async function editRisk(id) {
            try {
                const response = await apiGet(`/risks/${id}`);
                if (response.success) {
                    const risk = response.data;
                    document.getElementById('modal-title').textContent = '编辑风险';
                    document.getElementById('risk-id').value = risk.id;
                    document.getElementById('risk-title').value = risk.title;
                    document.getElementById('risk-category').value = risk.category;
                    document.getElementById('risk-description').value = risk.description || '';
                    document.getElementById('risk-level').value = risk.level;
                    document.getElementById('probability').value = risk.probability || 'medium';
                    document.getElementById('impact').value = risk.impact || 'medium';
                    document.getElementById('risk-status').value = risk.status;
                    showModal('risk-modal');
                }
            } catch (error) {
                console.error('获取风险详情失败:', error);
            }
        }

        // 删除风险
        async function deleteRisk(id) {
            if (!confirm('确定要删除这个风险事项吗？')) {
                return;
            }

            try {
                const response = await apiDelete(`/risks/${id}`);
                if (response.success) {
                    showAlert('风险事项删除成功', 'success');
                    loadRisks();
                } else {
                    showAlert(response.message, 'error');
                }
            } catch (error) {
                console.error('删除风险事项失败:', error);
                showAlert('删除失败', 'error');
            }
        }

        // 表单提交
        document.getElementById('risk-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const id = document.getElementById('risk-id').value;
            const data = {
                title: document.getElementById('risk-title').value,
                category: document.getElementById('risk-category').value,
                description: document.getElementById('risk-description').value,
                level: document.getElementById('risk-level').value,
                probability: document.getElementById('probability').value,
                impact: document.getElementById('impact').value,
                status: document.getElementById('risk-status').value,
                assigned_to: getUser().id,
                created_by: getUser().id
            };

            try {
                let response;
                if (id) {
                    response = await apiPut(`/risks/${id}`, data);
                } else {
                    response = await apiPost('/risks', data);
                }

                if (response.success) {
                    showAlert(id ? '风险事项更新成功' : '风险事项创建成功', 'success');
                    hideModal('risk-modal');
                    loadRisks();
                } else {
                    showAlert(response.message, 'error');
                }
            } catch (error) {
                console.error('保存风险事项失败:', error);
                showAlert('保存失败', 'error');
            }
        });

        // 搜索和筛选
        document.getElementById('search-input').addEventListener('input', debounce(loadRisks, 500));
        document.getElementById('status-filter').addEventListener('change', loadRisks);
        document.getElementById('level-filter').addEventListener('change', loadRisks);

        // 防抖函数
        function debounce(func, wait) {
            let timeout;
            return function executedFunction(...args) {
                const later = () => {
                    clearTimeout(timeout);
                    func(...args);
                };
                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }
    </script>
    <script src="/js/mobile-menu.js"></script>
</body>
</html>
