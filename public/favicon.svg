<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景圆形 -->
  <circle cx="50" cy="50" r="48" fill="#1a3c6e"/>
  
  <!-- 盾牌形状 -->
  <path d="M50 15 L75 25 L75 50 C75 70 50 85 50 85 C50 85 25 70 25 50 L25 25 Z" 
        fill="#2c5282" stroke="#ffffff" stroke-width="2"/>
  
  <!-- 天平底座 -->
  <rect x="46" y="55" width="8" height="20" fill="#ffffff" rx="2"/>
  
  <!-- 天平横梁 -->
  <rect x="30" y="50" width="40" height="4" fill="#ffffff" rx="2"/>
  
  <!-- 天平左盘 -->
  <path d="M32 54 L28 65 L36 65 Z" fill="#ffffff"/>
  <circle cx="32" cy="67" r="6" fill="none" stroke="#ffffff" stroke-width="2"/>
  
  <!-- 天平右盘 -->
  <path d="M68 54 L64 65 L72 65 Z" fill="#ffffff"/>
  <circle cx="68" cy="67" r="6" fill="none" stroke="#ffffff" stroke-width="2"/>
  
  <!-- 天平中心支点 -->
  <circle cx="50" cy="52" r="3" fill="#38b2ac"/>
</svg>