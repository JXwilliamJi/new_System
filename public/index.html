<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="theme-color" content="#1a3c6e">
    <title>法务合规管理平台 - 登录</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/css/mobile-responsive.css">
</head>
<body>
    <div id="login-screen">
        <div class="login-box">
            <div style="font-size: 40px; color: var(--primary-color); margin-bottom: 10px;">
                <i class="fa-solid fa-scale-balanced"></i>
            </div>
            <h2>法务合规管理平台</h2>
            <div id="alert-container"></div>
            <form id="login-form">
                <div class="input-group">
                    <label>用户名 / 工号</label>
                    <input type="text" id="username" placeholder="请输入用户名" required>
                </div>
                <div class="input-group">
                    <label>密码</label>
                    <input type="password" id="password" placeholder="请输入密码" required>
                </div>
                <button type="submit" class="btn-login">
                    <i class="fa-solid fa-sign-in-alt"></i> 登 录
                </button>
            </form>
            <div style="margin-top: 20px; font-size: 12px; color: var(--text-light);">
                <p>测试账号：</p>
                <p>管理员: admin / admin123</p>
                <p>普通用户: zhangsan / manager123</p>
            </div>
        </div>
    </div>

    <script src="/js/common.js"></script>
    <script>
        // 如果已登录，直接跳转到工作台
        if (isLoggedIn()) {
            window.location.href = '/pages/dashboard.html';
        }

        // 登录表单提交
        document.getElementById('login-form').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            const alertContainer = document.getElementById('alert-container');
            
            try {
                const response = await apiPost('/auth/login', { username, password });
                
                if (response.success) {
                    // 保存登录信息
                    saveLoginInfo(response.data.token, response.data.user);
                    
                    // 显示成功消息
                    alertContainer.innerHTML = '<div class="alert alert-success">登录成功，正在跳转...</div>';
                    
                    // 跳转到工作台
                    setTimeout(() => {
                        window.location.href = '/pages/dashboard.html';
                    }, 1000);
                } else {
                    alertContainer.innerHTML = `<div class="alert alert-error">${response.message}</div>`;
                }
            } catch (error) {
                alertContainer.innerHTML = '<div class="alert alert-error">登录失败，请稍后重试</div>';
            }
        });
    </script>
</body>
</html>
